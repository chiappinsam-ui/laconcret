    <style>
        /* UPDATED PRELOADER CSS */
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Dancing+Script:wght@600&display=swap');

        #loader-wrapper {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            background-color: #f2f2f2;
            z-index: 20000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease-out;
        }

        .loader-content {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            /* 1. START INVISIBLE */
            opacity: 0;
            /* 2. FADE IN ANIMATION (0.8s) */
            animation: fadeIn 0.8s ease-out forwards;
        }

        /* "Welcome to" Cursive Styling */
        .cursive-text {
            font-family: 'Dancing Script', cursive;
            font-size: 4.5rem;
            color: #000000;
            margin-bottom: -10px;
            position: relative;
            z-index: 10;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeUp 0.8s ease-out forwards;
            animation-delay: 0.2s;
        }

        .brand-wrapper {
            font-family: 'Archivo Black', sans-serif;
            font-size: 8rem;
            line-height: 1;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            position: relative;
            z-index: 10;
            opacity: 0;
            animation: simpleFade 0.8s ease-out forwards;
            animation-delay: 0.6s;
        }

        .la-text {
            color: #000000;
            margin-right: 2px;
        }

        .concrete-text {
            color: #000000;
            animation: lightUp 0.3s ease-out forwards;
            animation-delay: 1.2s; /* Waits for fade-in to finish before lighting up */
        }

        /* ANIMATIONS */
        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes simpleFade {
            to { opacity: 1; }
        }

        @keyframes lightUp {
            0% { color: #000000; text-shadow: none; }
            30% { color: #802600; text-shadow: none; } /* Flicker dark */
            60% { color: #000000; text-shadow: none; } /* Flicker off */
            100% { 
                color: #ff4d00; 
                text-shadow: 0 0 20px rgba(255, 77, 0, 0.4); /* Glow */
            }
        }

        .loader-hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .brand-wrapper { 
                font-size: 10.5vw; /* Scaled down from 15vw so "CONCRETE'S" fits perfectly */
                justify-content: center;
                width: 100%;
            }
            .cursive-text { 
                font-size: 10vw; 
            }
            .services-text {
                font-size: 9vw;
            }
        }
        :root {
            --primary: #FF4D00;
            --dark: #050505;
        }

        /* --- GLOBAL RESET & BASE --- */
        body {
            background-color: var(--dark);
            color: white;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        ::selection {
            background: var(--primary);
            color: white;
        }

        /* --- CANVAS BACKGROUND --- */
        #dust-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0.3;
        }

        /* --- TYPOGRAPHY UTILITIES --- */
        .text-outline {
            -webkit-text-stroke: 2px #ffffff;
            color: transparent;
        }
        .text-outline-sm {
            -webkit-text-stroke: 1px rgba(255,255,255,0.5);
            color: transparent;
        }

        /* ==========================================================================
           LIFTED PILL NAV (Matches Site)
           ========================================================================== */
        #pill-nav-container {
            position: fixed;
            top: 0.5rem;
            left: 0;
            width: 100%;
            justify-content: center;
            z-index: 1000;
            padding: 0 1rem;
            pointer-events: none;
        }
        .pill-nav-bar {
            pointer-events: auto;
            background: #000000;
            padding: 0.5rem 1rem;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 2rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .nav-logo {
            font-family: 'Kanit', sans-serif;
            font-weight: 800;
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .nav-items-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .pill-link {
            padding: 0.5rem 1rem;
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.7);
            transition: color 0.3s ease;
            letter-spacing: 0.5px;
        }
        .pill-link:hover, .pill-link.active {
            color: #ff4d00;
        }
        .nav-quote-btn {
            background: white;
            color: black;
            font-family: 'Outfit', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            padding: 0.6rem 1.2rem;
            border-radius: 100px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .nav-quote-btn:hover {
            background: #ff4d00;
            color: white;
        }

        /* Custom Radio Buttons / Cards */
        .option-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .option-card:hover {
            border-color: rgba(255, 77, 0, 0.5);
            background: rgba(255,255,255,0.05);
        }
        .option-card.selected {
            border-color: #FF4D00;
            background: rgba(255, 77, 0, 0.05);
        }
        .option-card.selected .check-icon {
            opacity: 1;
            transform: scale(1);
        }
        
        /* --- FORM TOGGLE SWITCH --- */
        .toggle-track {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 9999px;
            position: relative;
            display: flex;
            padding: 4px;
            width: fit-content;
            margin: 0 auto 1.5rem auto;
        }
        .toggle-slider {
            position: absolute;
            top: 4px;
            bottom: 4px;
            left: 4px;
            width: calc(50% - 4px);
            background: #FF4D00;
            border-radius: 9999px;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 0;
        }
        .toggle-slider.right {
            left: 50%;
        }
        .toggle-btn {
            position: relative;
            z-index: 10;
            padding: 0.5rem 2rem;
            font-family: 'Kanit', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            transition: color 0.3s ease;
            cursor: pointer;
            min-width: 140px;
            text-align: center;
        }
        .toggle-btn.active {
            color: white;
        }

        /* Input Fields */
        .minimal-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            padding: 0.75rem 0;
            color: white;
            font-family: 'Kanit', sans-serif;
            font-size: 1.25rem;
            transition: all 0.3s ease;
            outline: none;
            border-radius: 0;
        }
        .minimal-input:focus {
            border-bottom-color: #FF4D00;
            padding-left: 0.5rem;
        }
        .minimal-input::placeholder {
            color: rgba(255,255,255,0.2);
        }
        .minimal-label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #FF4D00;
            margin-bottom: 0.25rem;
            font-weight: 700;
        }

        /* Progress Bar */
        .progress-track {
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.1);
            position: relative;
            margin-bottom: 3rem;
        }
        .progress-fill {
            height: 100%;
            background: #FF4D00;
            width: 0%;
            transition: width 0.5s ease;
            position: relative;
        }
        .progress-glow {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            background: #FF4D00;
            border-radius: 50%;
            box-shadow: 0 0 20px #FF4D00;
        }

        /* --- FAQ ACCORDION --- */
        .accordion-item {
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .accordion-trigger {
            width: 100%;
            text-align: left;
            padding: 2rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        .accordion-trigger:hover {
            color: #FF4D00;
        }
        .accordion-content {
            height: 0;
            overflow: hidden;
            transition: height 0.5s cubic-bezier(0.65, 0, 0.35, 1);
            will-change: height;
        }
        .accordion-inner {
            padding-bottom: 2rem;
            color: rgba(255,255,255,0.7);
            line-height: 1.8;
        }
        .icon-plus {
            position: relative;
            width: 20px;
            height: 20px;
        }
        .icon-plus::before, .icon-plus::after {
            content: '';
            position: absolute;
            background: currentColor;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: transform 0.3s ease;
        }
        .icon-plus::before { width: 100%; height: 2px; }
        .icon-plus::after { width: 2px; height: 100%; }
        .accordion-trigger[aria-expanded="true"] .icon-plus::after {
            transform: translate(-50%, -50%) rotate(90deg);
        }

        /* --- BUTTONS --- */
        .btn-primary {
            background: white;
            color: black;
            font-family: 'Kanit', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 1rem 3rem;
            border-radius: 9999px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 1rem;
        }
        .btn-primary:hover {
            background: #FF4D00;
            color: white;
            box-shadow: 0 0 30px rgba(255, 77, 0, 0.3);
        }

        /* --- MAP PLACEHOLDER --- */
        .map-frame {
            width: 100%;
            height: 220px;
            transition: all 0.5s ease;
            will-change: filter, opacity;
        }
        @media (min-width: 1024px) {
            .map-frame {
                height: 100%;
            }
        }
    
        /* --- ANIMATIONS --- */
        .form-view {
            transition: opacity 0.3s ease, transform 0.3s ease;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .form-view.hidden-view {
            opacity: 0;
            pointer-events: none;
            z-index: -1;
            transform: translateY(10px);
        }
        .form-view:not(.hidden-view) {
            position: relative;
            opacity: 1;
            z-index: 10;
            transform: translateY(0);
        }
        .form-stage {
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }
        .form-stage.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* Form Container Fixed Height */
        .fixed-height-container {
            height: 600px;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* ==========================================================================
           SKINNY BOTTOM FOOTER
           ========================================================================== */
        .site-footer {
            width: 100%;
            background-color: #050505;
            padding: 1.5rem 0;
            border-top: 1px solid rgba(255,255,255,0.05);
            position: relative;
            z-index: 10;
        }
        .footer-copyright {
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }
        /* ==========================================================================
           MOBILE MENU ANIMATIONS & SCREEN LOCK
           ========================================================================== */
        /* Locks the screen from scrolling when menu is open */
        body.menu-open {
            overflow: hidden !important;
            touch-action: none;
        }

        /* Animates the Burger into an X */
        #hamburger-btn.is-active span:nth-child(1) {
            transform: translateY(4px) rotate(45deg);
        }
        #hamburger-btn.is-active span:nth-child(2) {
            transform: translateY(-4px) rotate(-45deg);
            width: 1.5rem !important;
        }

        /* Fades in the Glass Overlay */
        #mobile-menu-overlay.is-active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Slides the links up beautifully */
        #mobile-menu-overlay.is-active .mobile-link {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

                        <input type="email" placeholder="Email" required class="w-full bg-black/50 border border-white/10 rounded-xl p-3 md:p-4 text-white font-[Outfit] text-sm focus:outline-none focus:border-concrete-orange transition-colors">
                    </div>

                    <div class="grid grid-cols-2 gap-3 md:gap-6">
                        <input type="tel" placeholder="Phone" class="w-full bg-black/50 border border-white/10 rounded-xl p-3 md:p-4 text-white font-[Outfit] text-sm focus:outline-none focus:border-concrete-orange transition-colors">
                        <input type="text" placeholder="Suburb" class="w-full bg-black/50 border border-white/10 rounded-xl p-3 md:p-4 text-white font-[Outfit] text-sm focus:outline-none focus:border-concrete-orange transition-colors">
                    </div>

                    <textarea rows="3" placeholder="Tell us about your project..." required class="w-full bg-black/50 border border-white/10 rounded-xl p-3 md:p-4 text-white font-[Outfit] text-sm focus:outline-none focus:border-concrete-orange transition-colors resize-none"></textarea>

                    <button type="submit" class="mt-2 w-full bg-white text-black font-[Kanit] font-bold uppercase tracking-widest text-sm md:text-base py-3 md:py-4 rounded-xl hover:bg-concrete-orange hover:text-white transition-all duration-300 shadow-[0_0_20px_rgba(255,255,255,0.1)] hover:shadow-[0_0_20px_rgba(255,77,0,0.4)]">
                        Send Message
                    </button>
                </form>
            </div>
        </div>
    </main>
    <footer class="site-footer">
        <div class="footer-copyright">
            <p>&copy; 2026 LA Concrete. Built to Last.</p>
        </div>
    </footer>

    <script>
        // --- 1. SETUP & INITIALIZATION ---
        gsap.registerPlugin(ScrollTrigger, ScrollToPlugin);

        // --- 2. OPTIMIZED PARTICLE ENGINE ---
        const canvas = document.getElementById('dust-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        const PARTICLE_COUNT = 40;

        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = (Math.random() - 0.5) * 0.3;
                this.size = Math.random() * 2;
                this.color = `rgba(255, 255, 255, ${Math.random() * 0.08})`;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if(this.x < 0) this.x = width;
                if(this.x > width) this.x = 0;
                if(this.y < 0) this.y = height;
                if(this.y > height) this.y = 0;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        initParticles();
        animateParticles();

        // --- 3. PAGE ANIMATIONS & LOADER ---
        
        /* --- LOADER LOGIC (3 SECOND TIMER) --- */
        window.addEventListener("load", function () {
            const loader = document.getElementById("loader-wrapper");
            
            // Wait 3 seconds
            setTimeout(function() {
                loader.classList.add("loader-hidden");

                loader.addEventListener("transitionend", function() {
                    if (loader.parentNode) {
                        loader.parentNode.removeChild(loader);
                    }
                    if (typeof initPageAnimations === "function") {
                        initPageAnimations();
                    }
                });
            }, 3000); 
        });

        function initPageAnimations() {
            // Smooth cinematic entrance for the new glass panels
            gsap.to('.form-anim', {
                y: 0, 
                opacity: 1, 
                duration: 1.2, 
                stagger: 0.15,
                ease: 'power3.out'
            });
        }

        // --- 5. FAQ ACCORDION LOGIC ---
        document.querySelectorAll('.accordion-trigger').forEach(acc => {
            acc.addEventListener('click', () => {
                const expanded = acc.getAttribute('aria-expanded') === 'true';
                const content = acc.nextElementSibling;

                document.querySelectorAll('.accordion-trigger').forEach(other => {
                    if (other !== acc) {
                        other.setAttribute('aria-expanded', 'false');
                        other.nextElementSibling.style.height = '0px';
                        other.classList.remove('text-concrete-orange');
                    }
                });

                acc.setAttribute('aria-expanded', !expanded);
                content.style.height = expanded ? '0px' : content.scrollHeight + 'px';
                acc.classList.toggle('text-concrete-orange');
            });
        });

        // =========================================================================
        // SMART NAVBAR: HIDE ON SCROLL DOWN, SHOW ON SCROLL UP (GSAP SYNCED)
        // =========================================================================
        const desktopNav = document.getElementById('pill-nav-container');
        const mobileNav = document.getElementById('mobile-nav-bar');

        if (mobileNav) mobileNav.classList.add('transition-transform', 'duration-300', 'ease-in-out');
        if (desktopNav) desktopNav.classList.add('transition-transform', 'duration-300', 'ease-in-out');

        ScrollTrigger.create({
            start: 'top -50',
            onUpdate: (self) => {
                if (document.body.classList.contains('menu-open')) return;

                if (self.direction === 1) {
                    if (desktopNav) desktopNav.style.transform = 'translateY(-150%)';
                    if (mobileNav) mobileNav.style.transform = 'translateY(-150%)';
                } else {
                    if (desktopNav) desktopNav.style.transform = 'translateY(0)';
                    if (mobileNav) mobileNav.style.transform = 'translateY(0)';
                }
            }
        });

        // =========================================================================
        // MOBILE MENU TOGGLE LOGIC
        // =========================================================================
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const mobileMenuOverlay = document.getElementById('mobile-menu-overlay');

        if (hamburgerBtn && mobileMenuOverlay) {
            hamburgerBtn.addEventListener('click', () => {
                // Toggle the 'X' animation and show overlay
                const isActive = hamburgerBtn.classList.toggle('is-active');
                mobileMenuOverlay.classList.toggle('is-active');
                
                // Toggle screen lock to prevent background scrolling
                if (isActive) {
                    document.body.classList.add('menu-open');
                } else {
                    document.body.classList.remove('menu-open');
                }
            });
        }

        // Nav Link Hovers
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('mousemove', (e) => {
                const r = link.getBoundingClientRect();
                gsap.to(link, {
                    x: (e.clientX - r.left - r.width / 2) * 0.15,
                    y: (e.clientY - r.top - r.height / 2) * 0.15,
                    scale: 1.05,
                    duration: 0.3,
                    ease: 'power2.out'
                });
            });

            link.addEventListener('mouseleave', () => {
                gsap.to(link, { x: 0, y: 0, scale: 1, duration: 0.3, ease: 'power2.out' });
            });
        });

        // Logo Magnetic Hover
        const logo = document.querySelector('.logo');
        if (logo) {
            logo.addEventListener('mousemove', (e) => {
                const r = logo.getBoundingClientRect();
                gsap.to(logo, {
                    x: (e.clientX - r.left - r.width / 2) * 0.1,
                    y: (e.clientY - r.top - r.height / 2) * 0.1,
                    scale: 1.03,
                    duration: 0.3,
                    ease: 'power2.out'
                });
            });

            logo.addEventListener('mouseleave', () => {
                gsap.to(logo, { x: 0, y: 0, scale: 1, duration: 0.3, ease: 'power2.out' });
            });
        }
    </script>
</body>
</html>
