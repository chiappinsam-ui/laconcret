    <script>
        // --- 1. SETUP & INITIALIZATION ---
        gsap.registerPlugin(ScrollTrigger, ScrollToPlugin);

        // --- 2. OPTIMIZED PARTICLE ENGINE ---
        const canvas = document.getElementById('dust-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        const PARTICLE_COUNT = 40;

        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = (Math.random() - 0.5) * 0.3;
                this.size = Math.random() * 2;
                this.color = `rgba(255, 255, 255, ${Math.random() * 0.08})`;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if(this.x < 0) this.x = width;
                if(this.x > width) this.x = 0;
                if(this.y < 0) this.y = height;
                if(this.y > height) this.y = 0;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        initParticles();
        animateParticles();

        // --- 3. PAGE ANIMATIONS & LOADER ---
        
        /* --- LOADER LOGIC (3 SECOND TIMER) --- */
        window.addEventListener("load", function () {
            const loader = document.getElementById("loader-wrapper");
            
            // Wait 3 seconds
            setTimeout(function() {
                loader.classList.add("loader-hidden");

                loader.addEventListener("transitionend", function() {
                    if (loader.parentNode) {
                        loader.parentNode.removeChild(loader);
                    }
                    if (typeof initPageAnimations === "function") {
                        initPageAnimations();
                    }
                });
            }, 3000); 
        });

        function initPageAnimations() {
            // Smooth cinematic entrance for the new glass panels
            gsap.to('.form-anim', {
                y: 0, 
                opacity: 1, 
                duration: 1.2, 
                stagger: 0.15,
                ease: 'power3.out'
            });
        }

        // --- 5. FAQ ACCORDION LOGIC ---
        document.querySelectorAll('.accordion-trigger').forEach(acc => {
            acc.addEventListener('click', () => {
                const expanded = acc.getAttribute('aria-expanded') === 'true';
                const content = acc.nextElementSibling;

                document.querySelectorAll('.accordion-trigger').forEach(other => {
                    if (other !== acc) {
                        other.setAttribute('aria-expanded', 'false');
                        other.nextElementSibling.style.height = '0px';
                        other.classList.remove('text-concrete-orange');
                    }
                });

                acc.setAttribute('aria-expanded', !expanded);
                content.style.height = expanded ? '0px' : content.scrollHeight + 'px';
                acc.classList.toggle('text-concrete-orange');
            });
        });

        // --- 6. SMART NAVIGATION HIDE ---
        const nav = document.querySelector('nav');
        let lastScrollY = window.scrollY;

        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }

            if (window.scrollY > lastScrollY && window.scrollY > 100) {
                nav.classList.add('nav-hidden');
            } else {
                nav.classList.remove('nav-hidden');
            }
            lastScrollY = window.scrollY;
        });

        // Mobile Menu
        const menuToggle = document.getElementById('menuToggle');
        const mobileMenu = document.getElementById('mobileMenu');
        if (menuToggle && mobileMenu) {
            menuToggle.addEventListener('click', () => {
                if (mobileMenu.classList.contains('hidden')) {
                    mobileMenu.classList.remove('hidden');
                    mobileMenu.classList.add('flex');
                } else {
                    mobileMenu.classList.add('hidden');
                    mobileMenu.classList.remove('flex');
                }
            });
        }

        // Nav Link Hovers
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('mousemove', (e) => {
                const r = link.getBoundingClientRect();
                gsap.to(link, {
                    x: (e.clientX - r.left - r.width / 2) * 0.15,
                    y: (e.clientY - r.top - r.height / 2) * 0.15,
                    scale: 1.05,
                    duration: 0.3,
                    ease: 'power2.out'
                });
            });

            link.addEventListener('mouseleave', () => {
                gsap.to(link, { x: 0, y: 0, scale: 1, duration: 0.3, ease: 'power2.out' });
            });
        });

        // Logo Magnetic Hover
        const logo = document.querySelector('.logo');
        if (logo) {
            logo.addEventListener('mousemove', (e) => {
                const r = logo.getBoundingClientRect();
                gsap.to(logo, {
                    x: (e.clientX - r.left - r.width / 2) * 0.1,
                    y: (e.clientY - r.top - r.height / 2) * 0.1,
                    scale: 1.03,
                    duration: 0.3,
                    ease: 'power2.out'
                });
            });

            logo.addEventListener('mouseleave', () => {
                gsap.to(logo, { x: 0, y: 0, scale: 1, duration: 0.3, ease: 'power2.out' });
            });
        }
    </script>
</body>
</html>
